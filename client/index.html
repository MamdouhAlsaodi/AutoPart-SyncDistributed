<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPart - Sistema Distribuído de Autopeças</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .loader { border:3px solid #f3f3f3; border-top:3px solid #2563eb; border-radius:50%; width:20px; height:20px; animation:spin 1s linear infinite; display:inline-block; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .input-field { @apply w-full px-4 py-2 rounded-lg border border-slate-300 bg-white text-slate-900 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">
    <div id="app">
        <div id="loading-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-white">
            <div class="flex flex-col items-center gap-4">
                <div class="loader" style="width:48px;height:48px;border-width:4px;"></div>
                <p class="text-slate-500 font-medium">Carregando Sistema...</p>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
